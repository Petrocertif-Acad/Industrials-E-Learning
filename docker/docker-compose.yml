services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: atti
      POSTGRES_PASSWORD: atti
      POSTGRES_DB: atti
    ports:
      - "5432:5432"
    volumes:
      - atti_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atti"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: atti
      MINIO_ROOT_PASSWORD: atti-minio-local
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - atti_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Service à usage unique : crée le bucket de documents au démarrage, puis
  # s'arrête. Le stockage compatible S3 (MinIO en local, S3/équivalent en
  # production) n'expose jamais d'URL publique permanente : l'application
  # génère des liens signés à courte durée de vie (voir lib/storage/s3.ts).
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 atti atti-minio-local &&
      mc mb --ignore-existing local/atti-documents
      "

  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://atti:atti@postgres:5432/atti?schema=public
      AUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET must be set}
      AUTH_URL: http://localhost:3000
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_PUBLIC_ENDPOINT: http://localhost:9000
      STORAGE_REGION: us-east-1
      STORAGE_BUCKET: atti-documents
      STORAGE_ACCESS_KEY_ID: atti
      STORAGE_SECRET_ACCESS_KEY: atti-minio-local
      STORAGE_FORCE_PATH_STYLE: "true"
    ports:
      - "3000:3000"
    profiles:
      - full

volumes:
  atti_postgres_data:
  atti_minio_data:
